name: E2E Playwright

# Sprint A — Visual regression gate (locked 2026-06-06)
#
# Corre en cada PR + push a main. Block merge si:
#   - regression.spec.ts assertion falla (los 6 bug patterns conocidos)
#   - hub-smoke.spec.ts visual diff > 2% sin baseline update intencional
#
# Si Mr. Lorenzo aprueba un cambio visual, regenerar baselines:
#   bun run e2e:update -- --grep "<test name>"
#   git add tests/screenshots
#   git commit -m "test: update screenshot baseline for <feature>"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Vitest unit tests (regression guards — bloquean merge)
        run: bun run test

      - name: Build production
        run: bun run build

      - name: Start preview server
        run: bun run preview --port 5173 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: bunx wait-on http://localhost:5173 -t 60000

      - name: Run regression tests (assertions — bloquean merge)
        run: bunx playwright test tests/e2e/regression.spec.ts --reporter=list

      - name: Run smoke tests (visual diff — bloquean merge)
        run: bunx playwright test tests/e2e/hub-smoke.spec.ts --reporter=list
        continue-on-error: false

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshot diffs (si hay fallos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: test-results/
          retention-days: 14
