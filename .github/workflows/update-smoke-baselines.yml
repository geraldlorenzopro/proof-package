name: Update Smoke Baselines (Linux)

# Trigger MANUAL ONLY — workflow_dispatch desde GitHub Actions UI.
#
# Razón: la baseline original (commit 67c14a8, Sprint A) comiteó solo
# screenshots `-darwin.png` (Mac local). El CI corre en Linux y busca
# `-linux.png` que nunca se generaron → hub-smoke.spec.ts queda rojo
# permanente con error "snapshot doesn't exist".
#
# Este workflow regenera los baselines Linux contra main HEAD y abre
# un PR para que Mr. Lorenzo revise visualmente los .png en la UI de
# GitHub (image diff nativa) ANTES de mergear.
#
# **NO se dispara automático** — Mr. Lorenzo lo fire manual cuando
# quiera regenerar. Cada disparo abre un PR nuevo con la fecha del run.
#
# Workflow propio para no contaminar e2e.yml ni cambiar su semántica.
# Documentado en HUMAN-ACTIONS #9 Resolution + #11.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build production
        run: bun run build

      - name: Start preview server
        run: bun run preview --port 5173 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: bunx wait-on http://localhost:5173 -t 60000

      - name: Regenerate smoke baselines (Linux)
        run: bunx playwright test tests/e2e/hub-smoke.spec.ts --update-snapshots --reporter=list

      - name: Show generated baselines
        run: |
          echo "=== Linux baselines generados ==="
          ls -la tests/e2e/hub-smoke.spec.ts-snapshots/*-linux.png 2>/dev/null || echo "(ninguno generado)"

      - name: Create PR with new baselines
        env:
          GH_TOKEN: ${{ github.token }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_ACTOR: ${{ github.actor }}
        run: bash .github/scripts/create-baselines-pr.sh
