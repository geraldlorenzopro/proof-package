  <body>
    <div id="root"></div>
    <script>
      // Pre-paint dark navy en /hub y /case-engine para evitar flashes:
      //   1. Inicial (pre-React): body negro default → navy. Splash y loading
      //      screens son full-bleed `position: fixed` con su propio gradient
      //      por encima, así que cubren el body sin que se note.
      //   2. Transiciones SPA entre /hub/* (Inicio ↔ Casos ↔ etc.): HubLayout
      //      usa `bg-background` (hsl 220 25% 6%). Si el body quedaba pintado
      //      con el gradient navy del splash, cualquier remount de layout
      //      mostraba un flash navy → dark. Con el body en el mismo color que
      //      --background, las transiciones son perfectamente limpias.
      var p = window.location.pathname;
      if (p.startsWith('/hub') || p.startsWith('/case-engine/')) {
        var bg = 'hsl(220, 25%, 6%)';
        document.documentElement.style.background = bg;
        document.body.style.background = bg;
        document.body.style.margin = '0';
        document.body.style.minHeight = '100vh';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
